# Copy relevant sections to ~/.dbt/profiles.yml and fill in credentials.
dbt_poc:
  target: dev
  outputs:
    dev:
      type: snowflake
      account: "<your_account>"
      user: "<your_user>"
      password: "<your_password>"
      role: "<your_role>"
      database: DATA_ENG_DBT
      warehouse: "<your_warehouse>"
      schema: DBT_BRONZE
      threads: 4
